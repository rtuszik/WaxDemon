---
# Default values for waxdemon.
# Reference: https://github.com/rtuszik/WaxDemon

replicaCount: 1

image:
    repository: ghcr.io/rtuszik/waxdemon
    pullPolicy: IfNotPresent
    # Overrides the image tag. Defaults to .Chart.AppVersion.
    tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
    create: true
    automount: true
    annotations: {}
    name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
    fsGroup: 10001
    seccompProfile:
        type: RuntimeDefault

# Container-level security context. Defaults match the Dockerfile's
# non-root `app` user (UID/GID 10001).
securityContext:
    runAsNonRoot: true
    runAsUser: 10001
    runAsGroup: 10001
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
        drop:
            - ALL

service:
    type: ClusterIP
    # The scaffold's deployment.yaml uses service.port as the
    # containerPort. waxdemon listens on 3000 by default.
    port: 3000

ingress:
    enabled: false
    className: ""
    annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
    hosts:
        - host: chart-example.local
          paths:
            - path: /
              pathType: ImplementationSpecific
    tls: []
    # - secretName: chart-example-tls
    #   hosts:
    #     - chart-example.local

# -- Expose the service via gateway-api HTTPRoute
# Requires Gateway API resources and a suitable controller installed
# within the cluster (see: https://gateway-api.sigs.k8s.io/guides/).
httpRoute:
    enabled: false
    annotations: {}
    parentRefs:
        - name: gateway
          sectionName: http
          # namespace: default
    hostnames:
        - chart-example.local
    rules:
        - matches:
            - path:
                type: PathPrefix
                value: /

resources: {}
# limits:
#   cpu: 500m
#   memory: 512Mi
# requests:
#   cpu: 100m
#   memory: 128Mi

# Probes hit /api/collection/sync/status — the same endpoint the
# Dockerfile HEALTHCHECK uses. It returns 200 as long as the app is up
# and the database pool is reachable.
livenessProbe:
    httpGet:
        path: /api/collection/sync/status
        port: http
    initialDelaySeconds: 15
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 3
readinessProbe:
    httpGet:
        path: /api/collection/sync/status
        port: http
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 80
    # targetMemoryUtilizationPercentage: 80

# Extra volumes / volumeMounts wired straight into the Deployment.
volumes: []
# - name: foo
#   secret:
#     secretName: mysecret
volumeMounts: []
# - name: foo
#   mountPath: "/etc/foo"
#   readOnly: true

nodeSelector: {}
tolerations: []
affinity: {}

# Non-sensitive environment variables. Rendered into a ConfigMap and
# mounted via envFrom. Leave DISCOGS_USERNAME empty to disable sync.
config:
    DISCOGS_USERNAME: ""
    SYNC_CRON_SCHEDULE: "0 0 0 * * *"
    RUST_LOG: "info"
    BIND_ADDR: "0.0.0.0:3000"

# Sensitive values. One of `existingSecret` or `databaseUrl` MUST be set
# — template rendering fails otherwise. discogsToken is optional; sync
# is skipped when empty.
secrets:
    # Use a pre-existing Secret (e.g., managed by External Secrets / SOPS).
    # When set, the chart does not create a Secret. Keys in the Secret
    # must match secrets.keys.* (defaults: DATABASE_URL, DISCOGS_TOKEN).
    existingSecret: ""
    keys:
        databaseUrl: DATABASE_URL
        discogsToken: DISCOGS_TOKEN
    # Inline values, used only when existingSecret is empty. Prefer
    # existingSecret in production.
    databaseUrl: ""
    discogsToken: ""

# Raw passthrough to the Deployment's `env` list.
extraEnv: []
# - name: MY_VAR
#   value: "hello"

# Raw passthrough to the Deployment's `envFrom` list.
extraEnvFrom: []
# - secretRef:
#     name: extra-secret
