{{- if not .Values.secrets.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "waxdemon.fullname" . }}
  labels:
    {{- include "waxdemon.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.secrets.keys.databaseUrl }}: {{ required "secrets.databaseUrl or secrets.existingSecret must be set — point the chart at a Postgres instance" .Values.secrets.databaseUrl | quote }}
  {{- if .Values.secrets.discogsToken }}
  {{ .Values.secrets.keys.discogsToken }}: {{ .Values.secrets.discogsToken | quote }}
  {{- end }}
{{- end }}
