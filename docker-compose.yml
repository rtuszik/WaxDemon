---
version: "3.8"

services:
    postgres:
        image: postgres:18-alpine
        container_name: waxdemon-postgres
        ports:
            - "5432:5432"
        volumes:
            - postgres-data:/var/lib/postgresql/data
        env_file: .env
        restart: unless-stopped
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U waxdemon"]
            interval: 10s
            timeout: 5s
            retries: 5

    waxdemon:
        image: ghcr.io/rtuszik/waxdemon:latest
        build: .
        container_name: waxdemon
        ports:
            - "3000:3000"
        env_file: .env
        depends_on:
            postgres:
                condition: service_healthy
        restart: unless-stopped

volumes:
    postgres-data:
